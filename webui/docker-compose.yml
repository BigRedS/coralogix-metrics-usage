# Read-only deployment of the coralogix-unused-metrics-finder webui.
#
# Pulls the prebuilt multi-arch image (linux/amd64 + linux/arm64) from GHCR:
#   docker compose up
#
# Then open http://localhost:8765.
#
# To build from local source instead of pulling, use:
#   docker compose up --build
# The build context is the repo root because the webui imports internal/...
# packages from the parent Go module.

services:
  webui:
    image: ghcr.io/bigreds/coralogix-unused-metrics-finder-webui:latest
    build:
      context: ..
      dockerfile: webui/Dockerfile
    ports:
      - "127.0.0.1:8765:8765"
    read_only: true
    tmpfs:
      - /tmp:rw,size=512m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
